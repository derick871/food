<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White House Launch</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white antialiased">
    <!-- Hero Section -->
    <header class="relative h-screen w-full overflow-hidden flex flex-col">
        
        <!-- Background Video -->
        <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover z-0">
            <source src="video/white house lounch.mp4" type="video/mp4">
        </video>

        <!-- Dark Overlay for Readability -->
        <div class="absolute inset-0 bg-black/40 z-10"></div>

        <!-- Navigation -->
        <nav class="relative z-20 flex items-center justify-between px-8 py-6 md:px-16">
            <div class="flex items-center gap-3">
                <img src="images/ugali2.jpg" alt="Logo" class="h-12 w-12 rounded-full object-cover border-2 border-white">
                <span class="text-white font-bold text-xl hidden sm:block">WHITE HOUSE</span>
            </div>
            
            <div class="flex gap-8 text-amber-500 font-medium">
                <a href="/" class="hover:text-amber-400 transition-colors">Home</a>
                <a href="about.html" class="hover:text-amber-400 transition-colors">About</a>
                <a href="contact.html" class="hover:text-amber-400 transition-colors">Menu</a>
                <a href="service.html" class="hover:text-amber-400 transition-colors">Services</a>
            </div>
        </nav>

        <!-- Hero Content -->
        <div class="relative z-20 flex-1 flex flex-col items-center justify-center text-center px-4">
            <h1 class="text-white text-4xl md:text-6xl font-bold mb-4 drop-shadow-lg">
                Welcome to White-House Launch
            </h1>
            <p class="text-gray-100 text-lg md:text-xl mb-8 max-w-2xl">
                We provide all kinds of meals curated specifically for your taste and lifestyle.
            </p>
            
            <a href="about.html" class="bg-amber-600 hover:bg-amber-700 text-white px-8 py-3 rounded-full font-semibold transition-all transform hover:scale-105 shadow-xl">
                Get Started
            </a>
        </div>

    </header>
</body>
</html>
