<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White House | Food Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="m-0 p-0 bg-white text-gray-800 antialiased">

    <!-- Header & Nav -->
    <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm shadow-sm p-4">
        <nav class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <ul class="flex gap-8 font-medium text-amber-800">
                <li><a href="index.html" class="hover:text-amber-600 transition">Home</a></li>
                <li><a href="about.html" class="hover:text-amber-600 transition">About</a></li>
                <li><a href="contact.html" class="border-b-2 border-amber-800">Menu</a></li>
                <li><a href="service.html" class="hover:text-amber-600 transition">Services</a></li>
            </ul>
            
            <div class="flex items-center gap-2">
                <input type="search" id="search" placeholder="Search food..." 
                    class="px-4 py-1 border border-amber-200 rounded-full focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm">
            </div>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <h1 class="text-4xl font-bold text-amber-800 text-center my-8 uppercase tracking-widest">Food Menu</h1>

        <!-- Section: Ugali -->
        <section class="mb-12">
            <h2 class="text-2xl font-bold text-amber-900 mb-6 border-l-4 border-amber-500 pl-3">Ugali Specials</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Card 1 -->
                <div class="group bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-all duration-300 hover:-translate-y-1">
                    <img src="images/ugali1.jpg" alt="Ugali" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500">
                    <div class="p-4">
                        <h3 class="font-bold text-lg">Standard Ugali</h3>
                        <p class="text-amber-800 font-bold mt-2">Ksh 300</p>
                    </div>
                </div>
                <!-- Card 2 -->
                <div class="group bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-all duration-300 hover:-translate-y-1">
                    <img src="images/ugalixmeat.jpg" alt="Ugali Meat" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500">
                    <div class="p-4">
                        <h3 class="font-bold text-lg">Ugali x Nyama</h3>
                        <p class="text-amber-800 font-bold mt-2">Ksh 500</p>
                    </div>
                </div>
                <!-- Card 3 -->
                <div class="group bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-all duration-300 hover:-translate-y-1">
                    <img src="images/ugali5.jpg" alt="Ugali" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500">
                    <div class="p-4">
                        <h3 class="font-bold text-lg">Ugali Saucer</h3>
                        <p class="text-amber-800 font-bold mt-2">Ksh 200</p>
                    </div>
                </div>
                <!-- Card 4 -->
                <div class="group bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-all duration-300 hover:-translate-y-1">
                    <img src="images/ugali6.jpg" alt="Ugali" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500">
                    <div class="p-4">
                        <h3 class="font-bold text-lg">Ugali Plain</h3>
                        <p class="text-amber-800 font-bold mt-2">Ksh 150</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section: Fries -->
        <section class="mb-12">
            <h2 class="text-2xl font-bold text-amber-900 mb-6 border-l-4 border-amber-500 pl-3">Crispy Fries</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="group bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-all">
                    <img src="images/fries1.jpg" alt="Fries" class="w-full h-48 object-cover group-hover:scale-110 transition-transform">
                    <div class="p-4">
                        <h3 class="font-bold">Masala Fries</h3>
                        <p class="text-amber-800 font-bold mt-1">Ksh 250</p>
                    </div>
                </div>
                <div class="group bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-all">
                    <img src="images/fries2.jpg" alt="Fries" class="w-full h-48 object-cover group-hover:scale-110 transition-transform">
                    <div class="p-4">
                        <h3 class="font-bold">Plain Fries</h3>
                        <p class="text-amber-800 font-bold mt-1">Ksh 100</p>
                    </div>
                </div>
                <div class="group bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-all">
                    <img src="images/fries3.jpg" alt="Fries" class="w-full h-48 object-cover group-hover:scale-110 transition-transform">
                    <div class="p-4">
                        <h3 class="font-bold">Large Fries</h3>
                        <p class="text-amber-800 font-bold mt-1">Ksh 150</p>
                    </div>
                </div>
                <div class="group bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-all">
                    <img src="images/fries4.jpg" alt="Fries" class="w-full h-48 object-cover group-hover:scale-110 transition-transform">
                    <div class="p-4">
                        <h3 class="font-bold">Family Pack</h3>
                        <p class="text-amber-800 font-bold mt-1">Ksh 250</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Call to Action -->
        <div class="flex justify-center mt-16 mb-10">
            <a href="service.html" class="bg-violet-700 hover:bg-violet-800 text-white px-10 py-3 rounded-full font-bold shadow-lg transition-transform active:scale-95">
                Go to Services
            </a>
        </div>
    </main>

</body>
</html>
